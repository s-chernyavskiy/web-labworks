services:
  database:
    image: 'postgres:latest'
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    networks:
      - chernyavskiy_network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    networks:
      - chernyavskiy_network

  minio-create-buckets:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        until mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin}; do
          echo "waiting for minio..."
          sleep 1
        done
        mc mb -p local/${MINIO_BUCKET:-images} || true
        mc ls local/${MINIO_BUCKET:-images} || true
    networks:
      - chernyavskiy_network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - chernyavskiy_network

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - database
      - minio-create-buckets
      - redis
    env_file:
      - ".env"
    networks:
      - chernyavskiy_network

volumes:
  minio_data:

networks:
  chernyavskiy_network:
    driver: bridge